stages:
  - test
  - build

image: eclipse-temurin:21-jdk

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository

before_script:
  - chmod +x mvnw

test:
  stage: test
  script:
    - ./mvnw -B test

build:
  stage: build
  script:
    - ./mvnw -B -DskipTests package
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 week
