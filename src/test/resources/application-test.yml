spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:mem:soccer_intelligence;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

sports:
  sportradar:
    api-key: ""
    locale: en
    access-level: trial
    package-name: soccer-extended
    base-url: https://api.sportradar.com
    request-delay-ms: 1500
    max-retries: 2
