spring:
  application:
    name: soccer-intelligence-engine
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/soccer_intelligence}
    username: ${SPRING_DATASOURCE_USERNAME:soccer}
    password: ${SPRING_DATASOURCE_PASSWORD:soccer}
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

info:
  app:
    name: soccer-intelligence-engine
    version: 0.1.0-SNAPSHOT
    description: Java In-Play Soccer Intelligence Engine

sports:
  sportradar:
    api-key: ${SPORTRADAR_API_KEY:}
    locale: ${SPORTRADAR_LOCALE:en}
    access-level: ${SPORTRADAR_ACCESS_LEVEL:trial}
    package-name: ${SPORTRADAR_PACKAGE_NAME:soccer-extended}
    base-url: ${SPORTRADAR_BASE_URL:https://api.sportradar.com}
    request-delay-ms: ${SPORTRADAR_REQUEST_DELAY_MS:1100}
    max-retries: ${SPORTRADAR_MAX_RETRIES:2}
  live:
    enabled: ${SPORTS_LIVE_ENABLED:false}
    poll-delay-ms: ${SPORTS_LIVE_POLL_DELAY_MS:10000}
    full-timeline-refresh-ms: ${SPORTS_LIVE_FULL_TIMELINE_REFRESH_MS:60000}
    max-matches-per-tick: ${SPORTS_LIVE_MAX_MATCHES_PER_TICK:3}
    divergence-alert-threshold: ${SPORTS_LIVE_DIVERGENCE_ALERT_THRESHOLD:0.12}
    red-card-swing-threshold: ${SPORTS_LIVE_RED_CARD_SWING_THRESHOLD:0.10}
    pressure-alert-threshold: ${SPORTS_LIVE_PRESSURE_ALERT_THRESHOLD:2.5}
    xg-contradiction-threshold: ${SPORTS_LIVE_XG_CONTRADICTION_THRESHOLD:0.7}
    late-momentum-minute: ${SPORTS_LIVE_LATE_MOMENTUM_MINUTE:70}
    late-momentum-threshold: ${SPORTS_LIVE_LATE_MOMENTUM_THRESHOLD:15.0}
